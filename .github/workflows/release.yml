name: release

# Tag a version (e.g. `git tag v0.1.0 && git push --tags`) → build prebuilt binaries for the
# common targets and attach them to the GitHub release, named to cargo-binstall's convention
# (lavoisier-<rust-target>.tar.gz, binary at the archive root). `cargo binstall lavoisier` then
# downloads these instead of compiling — so end users need no Rust toolchain or protoc.

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: macos-14,        target: aarch64-apple-darwin }
          - { os: ubuntu-22.04,    target: x86_64-unknown-linux-gnu }
          - { os: ubuntu-22.04-arm, target: aarch64-unknown-linux-gnu }
    steps:
      - uses: actions/checkout@v4

      # Pinned modern protoc on every runner — Ubuntu's apt protoc (3.12) is too old: it rejects
      # the proto3 `optional` fields in the vendored xAI protos. setup-protoc bundles the
      # well-known types (timestamp.proto), which the protoc resolves built-in.
      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          version: "29.3"
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --locked -p lavoisier --target ${{ matrix.target }}

      - name: Package
        run: tar czf lavoisier-${{ matrix.target }}.tar.gz -C target/${{ matrix.target }}/release lav

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: lavoisier-${{ matrix.target }}.tar.gz
