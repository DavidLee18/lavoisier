name: release

# Tag a version (e.g. `git tag v0.1.0 && git push --tags`) → build prebuilt binaries for the
# common targets and attach them to the GitHub release, named to cargo-binstall's convention
# (lavoisier-<rust-target>.tar.gz, binary at the archive root). `cargo binstall lavoisier` then
# downloads these instead of compiling — so end users need no Rust toolchain or protoc.

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: macos-14,        target: aarch64-apple-darwin }
          - { os: ubuntu-22.04,    target: x86_64-unknown-linux-gnu }
          - { os: ubuntu-22.04-arm, target: aarch64-unknown-linux-gnu }
    steps:
      # Third-party actions are pinned to a full commit SHA (supply-chain hardening); the trailing
      # comment records the human-readable version the SHA corresponds to.
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      # Pinned modern protoc on every runner — Ubuntu's apt protoc (3.12) is too old: it rejects
      # the proto3 `optional` fields in the vendored xAI protos. We download the official release
      # directly (SHA-256 pinned) rather than via a JS action, so there is no Node-runtime
      # dependency (the arduino/setup-protoc action only ships a Node 20 entrypoint, which the runner
      # forces onto Node 24 with a deprecation warning) and no GITHUB_TOKEN is needed. protoc
      # resolves the well-known types (timestamp.proto) from its sibling `include/` directory.
      - name: Install protoc
        shell: bash
        env:
          PROTOC_VERSION: "29.3"
        run: |
          set -euo pipefail
          case "${{ runner.os }}-${{ runner.arch }}" in
            Linux-X64)   asset=linux-x86_64;   sha=3e866620c5be27664f3d2fa2d656b5f3e09b5152b42f1bedbf427b333e90021a ;;
            Linux-ARM64) asset=linux-aarch_64; sha=6427349140e01f06e049e707a58709a4f221ae73ab9a0425bc4a00c8d0e1ab32 ;;
            macOS-ARM64) asset=osx-aarch_64;   sha=2b8a3403cd097f95f3ba656e14b76c732b6b26d7f183330b11e36ef2bc028765 ;;
            *) echo "unsupported runner ${{ runner.os }}-${{ runner.arch }}"; exit 1 ;;
          esac
          url="https://github.com/protocolbuffers/protobuf/releases/download/v${PROTOC_VERSION}/protoc-${PROTOC_VERSION}-${asset}.zip"
          curl -fsSL -o protoc.zip "$url"
          echo "${sha}  protoc.zip" | shasum -a 256 -c -
          unzip -q protoc.zip -d "$HOME/.protoc"
          echo "$HOME/.protoc/bin" >> "$GITHUB_PATH"
          "$HOME/.protoc/bin/protoc" --version

      # rust-toolchain selects the toolchain from the ref name (`@stable`); pinned to a SHA, that
      # signal is gone, so the channel is passed explicitly via the `toolchain` input.
      - name: Rust toolchain
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master @ 2026-06-18
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --locked -p lavoisier --target ${{ matrix.target }}

      - name: Package
        run: tar czf lavoisier-${{ matrix.target }}.tar.gz -C target/${{ matrix.target }}/release lav

      - name: Upload to release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          files: lavoisier-${{ matrix.target }}.tar.gz
